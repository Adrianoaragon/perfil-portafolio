<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adriano</title>
  <link rel="stylesheet" href="src/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- GATE -->
  <div id="gate">
    <div class="gate-inner">
      <div class="gate-rings">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
      </div>
      <p class="gate-text">click to enter</p>
    </div>
  </div>

  <!-- FONDO -->
  <div id="bg-layer"></div>
  <div id="bg-overlay"></div>

  <!-- MAIN -->
  <main id="main" class="hidden">

    <!-- PERFIL FLOTANTE (sin tarjeta) -->
    <section class="profile-float">
      <div class="avatar-area">
        <div class="avatar-ring" id="avatar-ring">
          <img id="avatar-img" src="assets/avatar.jpg" alt="avatar" class="avatar-img" />
          <img id="avatar-deco" src="" alt="" class="avatar-deco hidden" />
        </div>
        <span id="status-dot" class="status-dot offline"></span>
      </div>
      <h1 class="profile-name" id="profile-name">adriano</h1>
      <p class="profile-bio" id="profile-bio">STREAMER & SYSTEM ENGINEER</p>
      <p class="profile-loc" id="profile-loc">📍 COLOMBIA</p>
    </section>

    <!-- WIDGET ACTIVIDAD / SPOTIFY (glassmorphism) -->
    <div id="activity-card" class="activity-card hidden">
      <div class="activity-inner">
        <div class="activity-imgs">
          <img id="act-large" src="" alt="" class="act-large" />
          <img id="act-small" src="" alt="" class="act-small hidden" />
        </div>
        <div class="activity-text">
          <span class="activity-type" id="act-type"></span>
          <span class="activity-name" id="act-name"></span>
          <span class="activity-detail" id="act-detail"></span>
          <span class="activity-state"  id="act-state"></span>
        </div>
      </div>
    </div>

    <!-- ICONOS SOCIALES (sin cajita, solo SVG blanco) -->
    <section class="socials-row" id="socials-row"></section>

    <!-- REPRODUCTOR -->
    <div id="music-player" class="music-player hidden">
      <!-- izquierda: portada + info -->
      <img id="music-cover" class="music-cover" src="" alt="cover" />
      <div class="music-center">
        <div class="music-meta">
          <span id="music-title"  class="music-title"></span>
          <span id="music-artist" class="music-artist"></span>
        </div>
        <div class="music-progress-row">
          <span id="music-current" class="music-time">0:00</span>
          <div class="music-bar-track" id="music-bar-track">
            <div class="music-bar-fill"  id="music-bar-fill"></div>
            <div class="music-bar-thumb" id="music-bar-thumb"></div>
          </div>
          <span id="music-duration" class="music-time">0:00</span>
        </div>
      </div>
      <!-- derecha: controles -->
      <div class="music-controls">
        <button class="mc-btn" id="btn-prev" title="Reiniciar">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="mc-btn mc-play" id="btn-play">
          <svg id="icon-play"  viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" class="hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="mc-btn" id="btn-next" title="Siguiente">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.5 3.89L8 18.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
      <audio id="audio" loop></audio>
    </div>

  </main>

  <script type="module" src="src/js/app.js"></script>
</body>
</html>
